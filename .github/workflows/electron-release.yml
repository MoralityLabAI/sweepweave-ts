name: Electron Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os_name }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-latest
            os_name: windows
            args: --win nsis portable
            artifact_glob: |
              release/*.exe
              release/*.blockmap
              release/latest*.yml
          - runner: ubuntu-latest
            os_name: linux
            args: --linux AppImage tar.gz
            artifact_glob: |
              release/*.AppImage
              release/*.tar.gz
          - runner: macos-latest
            os_name: macos
            args: --mac dmg zip
            artifact_glob: |
              release/*.dmg
              release/*-mac*.zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Build Electron Artifacts
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder ${{ matrix.args }} --publish never

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sweepweave-${{ matrix.os_name }}
          path: ${{ matrix.artifact_glob }}
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest

    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Flatten Artifacts
        shell: bash
        run: |
          mkdir -p release-bundle
          find release-artifacts -type f -exec cp {} release-bundle/ \;
          ls -lah release-bundle

      - name: Generate SHA256 Checksums
        shell: bash
        run: |
          cd release-bundle
          sha256sum * > SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-bundle/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

